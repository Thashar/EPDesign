<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPD Admin — Panel</title>
<link rel="icon" type="image/png" href="/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#040e19;font-family:'Space Grotesk',sans-serif;color:#eaf2f8;font-size:14px}

/* Layout */
.layout{display:grid;grid-template-rows:80px 1fr;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:#040e19;border-bottom:1px solid rgba(160,200,225,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px}
.sidebar{background:#040e19;border-right:1px solid rgba(160,200,225,0.08);overflow-y:auto;padding:16px 0}
.main{overflow-y:auto;padding:32px;background:#05101c}

/* Topbar */
.topbar-logo{height:64px;opacity:0.85}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-status{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;color:#4f6e85}
.topbar-status.ok{color:#3ecf8e}
.topbar-status.err{color:#e05555}
.topbar-status.saving{color:#2fb6d6}
.btn-logout{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:12px;letter-spacing:.04em;color:#4f6e85;background:none;border:1px solid rgba(160,200,225,0.12);border-radius:2px;padding:7px 14px;cursor:pointer;transition:color .2s,border-color .2s}
.btn-logout:hover{color:#eaf2f8;border-color:rgba(160,200,225,0.3)}
.btn-save{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#04121d;background:#2fb6d6;border:none;border-radius:3px;padding:8px 20px;cursor:pointer;transition:background .2s}
.btn-save:hover{background:#56cce6}
.btn-save:disabled{opacity:0.4;cursor:not-allowed}

/* Sidebar */
.nav-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#2f4558;padding:12px 20px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;padding:11px 20px;cursor:pointer;color:#7f9bb0;font-size:13px;font-family:'Space Grotesk',sans-serif;font-weight:500;transition:color .15s,background .15s;border-left:2px solid transparent;white-space:nowrap}
.nav-item:hover{color:#bcd2e2;background:rgba(255,255,255,0.02)}
.nav-item.active{color:#eaf2f8;border-left-color:#2fb6d6;background:rgba(47,182,214,0.06)}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:22px;color:#f3f8fc}
.section-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#2fb6d6;background:rgba(47,182,214,0.08);border:1px solid rgba(47,182,214,0.2);border-radius:2px;padding:3px 10px}

/* Cards */
.card{background:#06121f;border:1px solid rgba(160,200,225,0.08);border-radius:3px;margin-bottom:12px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;gap:12px;user-select:none}
.card-head:hover{background:rgba(255,255,255,0.02)}
.card-code{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#2fb6d6;flex:none}
.card-title{font-family:'Space Grotesk',sans-serif;font-weight:500;color:#eaf2f8;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-actions{display:flex;gap:6px;flex:none}
.card-body{display:none;padding:18px;border-top:1px solid rgba(160,200,225,0.06);background:#040e19}
.card-body.open{display:block}

/* Buttons */
.btn-add{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;letter-spacing:.04em;color:#2fb6d6;background:rgba(47,182,214,0.08);border:1px solid rgba(47,182,214,0.25);border-radius:2px;padding:8px 16px;cursor:pointer;transition:background .2s,border-color .2s}
.btn-add:hover{background:rgba(47,182,214,0.15);border-color:rgba(47,182,214,0.45)}
.btn-del{font-size:13px;background:none;border:none;color:#4f6e85;cursor:pointer;padding:4px 8px;border-radius:2px;transition:color .15s,background .15s}
.btn-del:hover{color:#e05555;background:rgba(224,85,85,0.08)}
.btn-edit{font-size:12px;font-family:'Space Grotesk',sans-serif;font-weight:500;background:none;border:1px solid rgba(160,200,225,0.15);color:#7f9bb0;cursor:pointer;padding:5px 12px;border-radius:2px;transition:color .15s,border-color .15s}
.btn-edit:hover{color:#eaf2f8;border-color:rgba(160,200,225,0.35)}
.btn-sm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#04121d;background:#2fb6d6;border:none;border-radius:2px;padding:8px 16px;cursor:pointer;transition:background .2s}
.btn-sm:hover{background:#56cce6}

/* Forms */
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
label.fl{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#4f6e85;margin-bottom:6px}
input[type=text],input[type=email],input[type=tel],input[type=url],select,textarea{display:block;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(160,200,225,0.15);border-radius:2px;padding:10px 13px;font-family:'Space Grotesk',sans-serif;font-size:13px;color:#eaf2f8;outline:none;transition:border-color .2s;color-scheme:dark}
input::placeholder,textarea::placeholder{color:#3a5568}
input:focus,textarea:focus,select:focus{border-color:rgba(47,182,214,0.5)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
select option{background:#040e19}
.form-actions{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap}
.form-divider{border:none;border-top:1px solid rgba(160,200,225,0.07);margin:20px 0}

/* Photo upload */
.photo-zone{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.photo-preview{width:72px;height:72px;border-radius:2px;object-fit:cover;border:1px solid rgba(160,200,225,0.15);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;color:#3a5568;font-size:11px;text-align:center;font-family:'IBM Plex Mono',monospace;overflow:hidden;flex:none}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-controls{display:flex;flex-direction:column;gap:8px}
.btn-file{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:#2fb6d6;background:rgba(47,182,214,0.08);border:1px solid rgba(47,182,214,0.22);border-radius:2px;padding:8px 14px;cursor:pointer;transition:background .2s}
.btn-file:hover{background:rgba(47,182,214,0.16)}
.photo-url-note{font-size:12px;color:#4f6e85;font-family:'Space Grotesk',sans-serif}

/* Grid for team */
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:16px}
.person-card{background:#06121f;border:1px solid rgba(160,200,225,0.08);border-radius:3px;padding:16px}
.person-card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.person-photo{width:48px;height:48px;border-radius:2px;object-fit:cover;border:1px solid rgba(160,200,225,0.12);flex:none;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;color:#3a5568;font-size:10px;overflow:hidden}
.person-photo img{width:100%;height:100%;object-fit:cover}
.person-info{flex:1;overflow:hidden}
.person-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#eaf2f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-role{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#2fb6d6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-subrole{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#4f6e85}

/* Cert upload */
.cert-card{background:#06121f;border:1px solid rgba(160,200,225,0.08);border-radius:3px;padding:20px;margin-bottom:12px}
.cert-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cert-code{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#2fb6d6}
.cert-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#4f6e85}
.cert-preview{width:100%;aspect-ratio:1.414;background:repeating-linear-gradient(-45deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 1px,transparent 1px,transparent 8px);border:1px solid rgba(160,200,225,0.1);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;overflow:hidden;max-width:280px}
.cert-preview img{width:100%;height:100%;object-fit:contain}

/* Timeline */
.timeline-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.tl-year{width:60px;flex:none}
.tl-text{flex:1}
.tl-del{flex:none;align-self:center}

/* Kontakt form */
.kontakt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#06121f;border:1px solid rgba(47,182,214,0.35);border-radius:3px;padding:14px 20px;font-size:13px;color:#eaf2f8;font-family:'Space Grotesk',sans-serif;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:rgba(224,85,85,0.45);color:#f8a0a0}

/* Util */
.mono{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#4f6e85}
.hidden{display:none!important}
.empty-state{padding:40px;text-align:center;color:#3a5568;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em}

/* ── Mobile ─────────────────────────────────────────────────────────────── */
@media (max-width:720px){
  .layout{grid-template-rows:64px auto 1fr;grid-template-columns:1fr;height:auto;min-height:100vh;overflow:visible}
  .topbar{padding:0 16px}
  .topbar-logo{height:44px}
  .topbar-status{display:none}
  .btn-save{padding:8px 14px;font-size:12px}
  .btn-logout{padding:7px 10px;font-size:11px}

  .sidebar{grid-row:2;grid-column:1;border-right:none;border-bottom:1px solid rgba(160,200,225,0.08);padding:0;display:flex;overflow-x:auto;overflow-y:visible;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .sidebar::-webkit-scrollbar{display:none}
  .nav-label{display:none}
  .nav-item{display:inline-flex;flex-shrink:0;padding:14px 18px;border-left:none;border-bottom:2px solid transparent;font-size:13px}
  .nav-item.active{background:rgba(47,182,214,0.06);border-left-color:transparent;border-bottom-color:#2fb6d6}

  .main{grid-row:3;grid-column:1;padding:20px 16px;overflow-y:visible}

  .form-row{grid-template-columns:1fr}
  .kontakt-grid{grid-template-columns:1fr}
  .person-grid{grid-template-columns:1fr}
  .section-header{flex-direction:column;align-items:flex-start}
  .section-title{font-size:18px}
  .card-head{padding:12px 14px}
  .card-body{padding:14px}
  .cert-preview{max-width:100%}
  .photo-zone{flex-direction:column;align-items:flex-start}
  .form-actions{flex-direction:column;align-items:flex-start}
  .timeline-row{flex-wrap:wrap}
  .tl-year{width:100%}
}
</style>
</head>
<body>

<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <img src="uploads/epd-logo-white.png" alt="EPD" class="topbar-logo">
    <div class="topbar-right">
      <span class="topbar-status" id="status">Ładowanie...</span>
      <button class="btn-save" id="btnSave" onclick="saveAll()" disabled>Zapisz zmiany</button>
      <button class="btn-logout" onclick="logout()">Wyloguj</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-label">Treść strony</div>
    <div class="nav-item active" onclick="showSection('hero')">Strona główna</div>
    <div class="nav-item" onclick="showSection('realizacje')">Realizacje</div>
    <div class="nav-item" onclick="showSection('uslugi')">Usługi</div>
    <div class="nav-label">Firma</div>
    <div class="nav-item" onclick="showSection('ofirmie')">O firmie</div>
    <div class="nav-item" onclick="showSection('kadra')">Kadra</div>
    <div class="nav-item" onclick="showSection('certyfikaty')">Certyfikaty</div>
    <div class="nav-item" onclick="showSection('kontakt')">Kontakt</div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="empty-state">ŁADOWANIE DANYCH...</div>
  </main>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="fileInput" accept="image/*" class="hidden">
<input type="file" id="certFileInput" accept="image/*" class="hidden">

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let TOKEN = '';
let DATA = {};
let currentSection = 'hero';
let pendingPhotoCallback = null;
let pendingCertCallback = null;

// ─── Auth guard ─────────────────────────────────────────────────────────────
TOKEN = sessionStorage.getItem('epd_token') || '';
if (!TOKEN) window.location.href = '/admin.html';

function logout() {
  sessionStorage.removeItem('epd_token');
  window.location.href = '/admin.html';
}

// ─── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'err' ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 3500);
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'topbar-status ' + type;
}

// ─── API ────────────────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${TOKEN}`,
      ...(opts.headers || {})
    }
  });
  if (r.status === 401) { logout(); return null; }
  return r;
}

async function loadData() {
  setStatus('Ładowanie...', '');
  try {
    const r = await fetch('/api/content');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    document.getElementById('btnSave').disabled = false;
    setStatus('Dane załadowane', 'ok');
    renderSection(currentSection);
  } catch (e) {
    setStatus('Błąd ładowania', 'err');
    toast('Nie można załadować danych: ' + e.message, 'err');
  }
}

async function saveAll() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  setStatus('Zapisywanie...', 'saving');
  collectFormData();

  try {
    const r = await apiFetch('/api/content', {
      method: 'POST',
      body: JSON.stringify(DATA)
    });
    if (!r || !r.ok) {
      const d = r ? await r.json() : {};
      throw new Error(d.error || 'Błąd zapisu');
    }
    DATA.meta = { lastUpdated: new Date().toISOString().slice(0,10) };
    setStatus('Zapisano ✓', 'ok');
    toast('Zmiany zapisane pomyślnie');
  } catch (e) {
    setStatus('Błąd zapisu', 'err');
    toast(e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

async function uploadPhoto(file, callback) {
  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result.split(',')[1];
    setStatus('Przesyłanie zdjęcia...', 'saving');
    try {
      const r = await apiFetch('/api/upload', {
        method: 'POST',
        body: JSON.stringify({ filename: file.name, data: b64 })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      setStatus('Zdjęcie przesłane', 'ok');
      callback(d.url);
    } catch (e) {
      setStatus('Błąd uploadu', 'err');
      toast('Błąd przesyłania: ' + e.message, 'err');
    }
  };
  reader.readAsDataURL(file);
}

// ─── Navigation ─────────────────────────────────────────────────────────────
function showSection(name) {
  collectFormData();
  currentSection = name;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().toLowerCase().includes(name) ||
      (name === 'ofirmie' && el.textContent.includes('firmie')) ||
      (name === 'kadra' && el.textContent.includes('Kadra')) ||
      (name === 'certyfikaty' && el.textContent.includes('Certyfi')) ||
      (name === 'kontakt' && el.textContent.includes('Kontakt')) ||
      (name === 'realizacje' && el.textContent.includes('Realizacje')) ||
      (name === 'uslugi' && el.textContent.includes('sługi'))
    );
  });
  renderSection(name);
}

function renderSection(name) {
  const main = document.getElementById('main');
  switch (name) {
    case 'hero':       main.innerHTML = renderHero();       break;
    case 'realizacje': main.innerHTML = renderRealizacje(); break;
    case 'uslugi':     main.innerHTML = renderUslugi();     break;
    case 'ofirmie':    main.innerHTML = renderOfirmie();    break;
    case 'kadra':      main.innerHTML = renderKadra();      break;
    case 'certyfikaty':main.innerHTML = renderCertyfikaty();break;
    case 'kontakt':    main.innerHTML = renderKontakt();    break;
  }
  bindSectionEvents(name);
}

// ─── Collect before save/navigate ───────────────────────────────────────────
function collectFormData() {
  switch (currentSection) {
    case 'hero':    collectHero();    break;
    case 'uslugi':  collectUslugi();  break;
    case 'ofirmie': collectOfirmie(); break;
    case 'kontakt': collectKontakt(); break;
  }
}

// ─── HERO ────────────────────────────────────────────────────────────────────
function renderHero() {
  const hh = DATA.hero_home   || {};
  const hu = DATA.hero_uslugi || {};
  return `
    <div class="section-header">
      <span class="section-title">Strona główna</span>
      <span class="section-badge">Hero</span>
    </div>

    <div class="card">
      <div class="card-head" onclick="toggleCard('hero-home-body')">
        <span class="card-code">HOME</span>
        <span class="card-title">Ekran startowy z animacją</span>
      </div>
      <div class="card-body open" id="hero-home-body">
        <div class="form-group">
          <label class="fl">Napis z migającą kropką</label>
          <input type="text" id="hh-tagline" value="${esc(hh.tagline || '')}" placeholder="np. Inżynieria orurowania · Energetyka i przemysł">
        </div>
        <div class="form-group">
          <label class="fl">Nagłówek główny</label>
          <input type="text" id="hh-heading" value="${esc(hh.heading || '')}" placeholder="np. Rurociągi projektowane z inżynierską precyzją.">
        </div>
        <div class="form-group">
          <label class="fl">Opis pod nagłówkiem</label>
          <textarea id="hh-description" rows="4">${esc(hh.description || '')}</textarea>
        </div>
        <div class="form-actions">
          <button class="btn-sm" onclick="saveHeroHome()">Zapisz</button>
          <span class="mono" id="hh-msg"></span>
        </div>
        <hr class="form-divider">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#4f6e85;margin-bottom:12px;">Podgląd</div>
        <div style="display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5fd0ec;margin-bottom:10px;">
          <span style="width:6px;height:6px;background:#2fb6d6;border-radius:50%;flex:none;"></span>
          <span id="hh-prev-tagline">${esc(hh.tagline || '')}</span>
        </div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(18px,2.5vw,28px);line-height:1.1;color:#f3f8fc;margin-bottom:10px;" id="hh-prev-heading">${esc(hh.heading || '')}</div>
        <div style="font-size:13px;line-height:1.6;color:#a9c2d4;max-width:500px;" id="hh-prev-desc">${esc(hh.description || '')}</div>
      </div>
    </div>

    <div class="card" style="margin-top:8px">
      <div class="card-head" onclick="toggleCard('hero-uslugi-body')">
        <span class="card-code">USŁUGI</span>
        <span class="card-title">Intro podstrony Usługi</span>
      </div>
      <div class="card-body" id="hero-uslugi-body">
        <div class="form-group">
          <label class="fl">Mały napis nad tytułem</label>
          <input type="text" id="hu-tag" value="${esc(hu.tag || '')}" placeholder="np. OFERTA">
        </div>
        <div class="form-group">
          <label class="fl">Nagłówek</label>
          <textarea id="hu-heading" rows="2">${esc(hu.heading || '')}</textarea>
          <div style="font-size:11px;color:#4f6e85;font-family:'IBM Plex Mono',monospace;margin-top:4px;">Nowa linia = łamanie na stronie</div>
        </div>
        <div class="form-group">
          <label class="fl">Opis</label>
          <textarea id="hu-subheading" rows="4">${esc(hu.subheading || '')}</textarea>
        </div>
        <div class="form-actions">
          <button class="btn-sm" onclick="saveHeroUslugi()">Zapisz</button>
          <span class="mono" id="hu-msg"></span>
        </div>
      </div>
    </div>

function toggleCard(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function saveRealizacja(i) {
  DATA.realizacje[i] = {
    ...DATA.realizacje[i],
    code:        document.getElementById(`r-code-${i}`).value.trim(),
    year:        document.getElementById(`r-year-${i}`).value.trim(),
    category:    document.getElementById(`r-cat-${i}`).value.trim(),

  };

  setTimeout(() => msg.textContent = '', 2000);

function delRealizacja(i) {
  if (!confirm('Usunąć ten projekt?')) return;
  DATA.realizacje.splice(i, 1);
  renderSection('realizacje');
}

function addRealizacja() {
  DATA.realizacje = DATA.realizacje || [];
  const next = DATA.realizacje.length + 1;
  const year = new Date().getFullYear();
  DATA.realizacje.unshift({
    id: `epd-${year}-${String(next).padStart(3,'0')}`,
    code: `EPD-${year}-${String(next).padStart(3,'0')}`,
    category: '',
    title: 'Nowy projekt',
    description: '',
    year: String(year)
  });
  renderSection('realizacje');
  setTimeout(() => {
    const body = document.getElementById('rc-body-0');
    if (body) body.classList.add('open');
  }, 50);
}

function collectOfirmie() {
  DATA.ofirmie = DATA.ofirmie || { paragraphs: [], timeline: [] };
  DATA.ofirmie.paragraphs = [0,1,2].map(i => {
    const el = document.getElementById(`of-p-${i}`);
    return el ? el.value.trim() : (DATA.ofirmie.paragraphs[i] || '');
  });
  const tl = DATA.ofirmie.timeline || [];
  DATA.ofirmie.timeline = tl.map((e,i) => {
    const y = document.getElementById(`tl-year-${i}`);
    const t = document.getElementById(`tl-text-${i}`);
    return { year: y ? y.value.trim() : e.year, text: t ? t.value.trim() : e.text };
  });
}

function addTimeline() {
  collectOfirmie();
  DATA.ofirmie.timeline.push({ year: '', text: '' });
  renderSection('ofirmie');
  const rows = document.querySelectorAll('[id^="tl-row-"]');
  const last = rows[rows.length - 1];
  if (last) last.querySelector('input').focus();
}

function delTimeline(i) {
  collectOfirmie();
  DATA.ofirmie.timeline.splice(i, 1);
  renderSection('ofirmie');
}

function personCard(p, i, group) {

}

function editPerson(i, group) {
  const arr = group === 'zarzad' ? DATA.kadra_zarzad : DATA.kadra_managerska;
  const p = arr[i];
  const panel = document.getElementById('person-edit-panel');
  panel.innerHTML = `
    <hr class="form-divider">
    <div class="section-header">
      <span class="section-title" style="font-size:16px">Edycja: ${esc(p.name || 'Nowa osoba')}</span>

    <div class="form-row">
      <div><label class="fl">Imię i Nazwisko</label><input type="text" id="pe-name" value="${esc(p.name)}"></div>
      <div><label class="fl">Stanowisko / Rola</label><input type="text" id="pe-role" value="${esc(p.role)}"></div>
    </div>
    <div class="form-group"><label class="fl">Dodatkowa rola (opcja)</label><input type="text" id="pe-subrole" value="${esc(p.subrole || '')}"></div>
    <div class="photo-zone">
      <div class="photo-preview" id="pe-photo-preview">
        ${p.photo ? `<img src="${esc(p.photo)}" id="pe-photo-img">` : '<img id="pe-photo-img" style="display:none">'}
      </div>
      <div class="photo-controls">
        <button class="btn-file" onclick="triggerPersonPhoto(${i},'${group}')">📷 Wybierz zdjęcie</button>
        <span class="photo-url-note">lub wklej URL:</span>
        <input type="text" id="pe-photo-url" value="${esc(p.photo || '')}" placeholder="https://... lub uploads/plik.jpg" style="font-size:11px;padding:6px 10px">

    <div class="form-actions">
      <button class="btn-sm" onclick="savePerson(${i},'${group}')">Zapisz osobę</button>
      <button class="btn-edit" onclick="cancelPersonEdit()">Anuluj</button>

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function triggerPersonPhoto(i, group) {
  pendingPhotoCallback = (url) => {
    document.getElementById('pe-photo-url').value = url;
    const img = document.getElementById('pe-photo-img');
    img.src = url; img.style.display = '';
    const prev = document.getElementById('pe-photo-preview');
    prev.innerHTML = `<img src="${url}" id="pe-photo-img">`;
  };
  document.getElementById('fileInput').click();
}

function savePerson(i, group) {
  const arr = group === 'zarzad' ? DATA.kadra_zarzad : DATA.kadra_managerska;
  arr[i] = {
    ...arr[i],
    name:    document.getElementById('pe-name').value.trim(),
    role:    document.getElementById('pe-role').value.trim(),
    subrole: document.getElementById('pe-subrole').value.trim(),
    photo:   document.getElementById('pe-photo-url').value.trim()
  };
  toast('Zaktualizowano osobę');
  renderSection('kadra');
}

function cancelPersonEdit() {
  document.getElementById('person-edit-panel').innerHTML = '';
}

function delPerson(i, group) {
  if (!confirm('Usunąć tę osobę?')) return;
  const arr = group === 'zarzad' ? DATA.kadra_zarzad : DATA.kadra_managerska;
  arr.splice(i, 1);
  renderSection('kadra');
}

function addPerson(group) {
  const arr = group === 'zarzad'
    ? (DATA.kadra_zarzad = DATA.kadra_zarzad || [])
    : (DATA.kadra_managerska = DATA.kadra_managerska || []);
  arr.push({ id: Date.now().toString(), name: '', role: '', subrole: '', photo: '' });
  renderSection('kadra');
  setTimeout(() => editPerson(arr.length - 1, group), 50);
}

          <div class="form-group"><label class="fl">NIP</label><input type="text" id="k-nip" value="${esc(k.nip||'')}"></div>
          <div class="form-group"><label class="fl">KRS</label><input type="text" id="k-krs" value="${esc(k.krs||'')}"></div>
          <div class="form-group"><label class="fl">REGON</label><input type="text" id="k-regon" value="${esc(k.regon||'')}"></div>
          <div class="form-group"><label class="fl">LinkedIn URL</label><input type="url" id="k-linkedin" value="${esc(k.linkedin||'')}"></div>
        </div>
      </div>
    </div>
  `;
}

function collectKontakt() {
  const fields = ['firma','ulica','miasto','email','nip','krs','regon','linkedin'];
  DATA.kontakt = DATA.kontakt || {};
  fields.forEach(f => {
    const el = document.getElementById(`k-${f}`);
    if (el) DATA.kontakt[f] = el.value.trim();
  });
}

// ─── File input handlers ─────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function() {
  if (!this.files[0] || !pendingPhotoCallback) return;
  uploadPhoto(this.files[0], pendingPhotoCallback);
  this.value = '';
  pendingPhotoCallback = null;
});

document.getElementById('certFileInput').addEventListener('change', function() {
  if (!this.files[0] || !pendingCertCallback) return;
  uploadPhoto(this.files[0], pendingCertCallback);
  this.value = '';
  pendingCertCallback = null;
});

// ─── Util ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindSectionEvents() { /* events are inline */ }

// ─── Init ────────────────────────────────────────────────────────────────────
loadData();
</script>
