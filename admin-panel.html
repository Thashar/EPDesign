<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPD Admin — Panel</title>
<link rel="icon" type="image/png" href="uploads/epd-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --a-bg:#040e19;--a-surface:#05101c;--a-card:#06121f;--a-inner:#040e19;
  --a-text:#eaf2f8;--a-heading:#f3f8fc;--a-muted:#7f9bb0;--a-dim:#4f6e85;
  --a-faint:#3a5568;--a-label:#2f4558;--a-nav-h:#bcd2e2;
  --a-acc:#2fb6d6;--a-acc-h:#56cce6;--a-acc-txt:#04121d;
  --a-acc-bg:rgba(47,182,214,0.08);--a-acc-bgh:rgba(47,182,214,0.15);
  --a-acc-bd:rgba(47,182,214,0.2);--a-acc-bdm:rgba(47,182,214,0.25);--a-acc-bdh:rgba(47,182,214,0.45);
  --a-acc-nav:rgba(47,182,214,0.06);--a-acc-focus:rgba(47,182,214,0.5);
  --a-bd-xs:rgba(160,200,225,0.07);--a-bd-sm:rgba(160,200,225,0.08);
  --a-bd-md:rgba(160,200,225,0.12);--a-bd:rgba(160,200,225,0.15);
  --a-bd-h:rgba(160,200,225,0.3);--a-bd-hh:rgba(160,200,225,0.35);
  --a-inp:rgba(255,255,255,0.04);--a-inp-ph:#3a5568;--a-inp-sel:#040e19;
  --a-hover:rgba(255,255,255,0.02);--a-del:rgba(224,85,85,0.08);
  --a-ok:#3ecf8e;--a-err:#e05555;--a-err-lt:#f8a0a0;--a-scheme:dark;
  --a-stripe:rgba(255,255,255,0.02);
}
[data-theme="light"]{
  --a-bg:#d1ddea;--a-surface:#dce4ee;--a-card:#e2e9f1;--a-inner:#e8eef5;
  --a-text:#0d2135;--a-heading:#060e1c;--a-muted:#3a5a74;--a-dim:#5a7a94;
  --a-faint:#8aacbc;--a-label:#9ab4c4;--a-nav-h:#1a4060;
  --a-acc:#2077a6;--a-acc-h:#1a6490;--a-acc-txt:#ffffff;
  --a-acc-bg:rgba(32,119,166,0.1);--a-acc-bgh:rgba(32,119,166,0.18);
  --a-acc-bd:rgba(32,119,166,0.3);--a-acc-bdm:rgba(32,119,166,0.35);--a-acc-bdh:rgba(32,119,166,0.55);
  --a-acc-nav:rgba(32,119,166,0.08);--a-acc-focus:rgba(32,119,166,0.45);
  --a-bd-xs:rgba(0,60,100,0.06);--a-bd-sm:rgba(0,60,100,0.1);
  --a-bd-md:rgba(0,60,100,0.15);--a-bd:rgba(0,60,100,0.2);
  --a-bd-h:rgba(0,60,100,0.35);--a-bd-hh:rgba(0,60,100,0.45);
  --a-inp:rgba(0,0,0,0.04);--a-inp-ph:#8aacbc;--a-inp-sel:#f0f4f8;
  --a-hover:rgba(0,0,0,0.02);--a-del:rgba(200,50,50,0.07);
  --a-ok:#1a9e6a;--a-err:#c03030;--a-err-lt:#c03030;--a-scheme:light;
  --a-stripe:rgba(0,0,0,0.025);
}
*{box-sizing:border-box;margin:0;padding:0}
body{display:none}
html,body{height:100%;background:var(--a-bg);font-family:'Space Grotesk',sans-serif;color:var(--a-text);font-size:14px}

/* Layout */
.layout{display:grid;grid-template-rows:80px 1fr;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--a-bg);border-bottom:1px solid var(--a-bd-sm);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px}
.sidebar{background:var(--a-bg);border-right:1px solid var(--a-bd-sm);overflow-y:auto;padding:16px 0}
.main{overflow-y:auto;overflow-x:hidden;padding:32px;background:var(--a-surface)}

/* Topbar */
.topbar-logo{height:64px;opacity:0.85}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-status{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--a-dim)}
.topbar-status.ok{color:var(--a-ok)}
.topbar-status.err{color:var(--a-err)}
.topbar-status.saving{color:var(--a-acc)}
.btn-logout{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:12px;letter-spacing:.04em;color:var(--a-dim);background:none;border:1px solid var(--a-bd-md);border-radius:2px;padding:7px 14px;cursor:pointer;transition:color .2s,border-color .2s}
.btn-logout:hover{color:var(--a-text);border-color:var(--a-bd-h)}
.btn-save{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--a-acc-txt);background:var(--a-acc);border:none;border-radius:3px;padding:8px 20px;cursor:pointer;transition:background .2s}
.btn-save:hover{background:var(--a-acc-h)}
.btn-save:disabled{opacity:0.4;cursor:not-allowed}
.lang-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;background:transparent;color:var(--a-dim);border:none;padding:6px 12px;cursor:pointer;transition:background .15s,color .15s;}
.lang-btn.active{background:var(--a-acc);color:var(--a-acc-txt);font-weight:600;}
#hero-preview-box{background:#040e19;border-radius:3px;padding:20px 24px;border:1px solid rgba(160,200,225,0.1);}
[data-theme="light"] #hero-preview-box{background:radial-gradient(125% 95% at 70% 38%,#eef7fd 0%,#cce2f3 46%,#8ab8d4 100%);border-color:rgba(0,80,120,0.18);}
.prev-dot{width:6px;height:6px;background:#2fb6d6;border-radius:50%;flex:none;}
[data-theme="light"] .prev-dot{background:#2077a6;}
.prev-tagline{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#5fd0ec;margin-bottom:10px;}
[data-theme="light"] .prev-tagline{color:#1a6090;}
.prev-heading{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(18px,2.5vw,28px);line-height:1.1;color:#f3f8fc;margin-bottom:10px;}
[data-theme="light"] .prev-heading{color:#06101c;}
.prev-desc{font-size:13px;line-height:1.6;color:#a9c2d4;max-width:500px;}
[data-theme="light"] .prev-desc{color:#2a5070;}
.btn-theme{background:none;border:1px solid var(--a-bd-md);border-radius:2px;color:var(--a-dim);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:color .2s,border-color .2s;flex:none;padding:0}
.btn-theme:hover{color:var(--a-text);border-color:var(--a-bd-h)}

/* Sidebar */
.nav-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--a-label);padding:12px 20px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;padding:11px 20px;cursor:pointer;color:var(--a-muted);font-size:13px;font-family:'Space Grotesk',sans-serif;font-weight:500;transition:color .15s,background .15s;border-left:2px solid transparent;white-space:nowrap}
.nav-item:hover{color:var(--a-nav-h);background:var(--a-hover)}
.nav-item.active{color:var(--a-text);border-left-color:var(--a-acc);background:var(--a-acc-nav)}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:22px;color:var(--a-heading)}
.section-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--a-acc);background:var(--a-acc-bg);border:1px solid var(--a-acc-bd);border-radius:2px;padding:3px 10px}

/* Cards */
.card{background:var(--a-card);border:1px solid var(--a-bd-sm);border-radius:3px;margin-bottom:12px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;gap:12px;user-select:none}
.card-head:hover{background:var(--a-hover)}
.card-code{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--a-acc);flex:none}
.card-title{font-family:'Space Grotesk',sans-serif;font-weight:500;color:var(--a-text);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-actions{display:flex;gap:6px;flex:none}
.card-body{display:none;padding:18px;border-top:1px solid var(--a-bd-xs);background:var(--a-inner)}
.card-body.open{display:block}

/* Buttons */
.btn-add{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;letter-spacing:.04em;color:var(--a-acc);background:var(--a-acc-bg);border:1px solid var(--a-acc-bdm);border-radius:2px;padding:8px 16px;cursor:pointer;transition:background .2s,border-color .2s}
.btn-add:hover{background:var(--a-acc-bgh);border-color:var(--a-acc-bdh)}
.btn-del{font-size:13px;background:none;border:none;color:var(--a-dim);cursor:pointer;padding:4px 8px;border-radius:2px;transition:color .15s,background .15s}
.btn-del:hover{color:var(--a-err);background:var(--a-del)}
.btn-edit{font-size:12px;font-family:'Space Grotesk',sans-serif;font-weight:500;background:none;border:1px solid var(--a-bd);color:var(--a-muted);cursor:pointer;padding:5px 12px;border-radius:2px;transition:color .15s,border-color .15s}
.btn-edit:hover{color:var(--a-text);border-color:var(--a-bd-hh)}
.btn-sm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--a-acc-txt);background:var(--a-acc);border:none;border-radius:2px;padding:8px 16px;cursor:pointer;transition:background .2s}
.btn-sm:hover{background:var(--a-acc-h)}

/* Forms */
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
label.fl{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--a-dim);margin-bottom:6px}
input[type=text],input[type=email],input[type=tel],input[type=url],select,textarea{display:block;width:100%;background:var(--a-inp);border:1px solid var(--a-bd);border-radius:2px;padding:10px 13px;font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--a-text);outline:none;transition:border-color .2s;color-scheme:var(--a-scheme)}
input::placeholder,textarea::placeholder{color:var(--a-inp-ph)}
input:focus,textarea:focus,select:focus{border-color:var(--a-acc-focus)}
textarea{resize:vertical;min-height:80px;line-height:1.55}
select option{background:var(--a-inp-sel)}
.form-actions{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap}
.form-divider{border:none;border-top:1px solid var(--a-bd-xs);margin:20px 0}

/* Photo upload */
.photo-zone{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.photo-preview{width:72px;height:72px;border-radius:2px;object-fit:cover;border:1px solid var(--a-bd);background:var(--a-inp);display:flex;align-items:center;justify-content:center;color:var(--a-faint);font-size:11px;text-align:center;font-family:'IBM Plex Mono',monospace;overflow:hidden;flex:none}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-controls{display:flex;flex-direction:column;gap:8px}
.btn-file{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12px;color:var(--a-acc);background:var(--a-acc-bg);border:1px solid var(--a-acc-bd);border-radius:2px;padding:8px 14px;cursor:pointer;transition:background .2s}
.btn-file:hover{background:var(--a-acc-bgh)}
.photo-url-note{font-size:12px;color:var(--a-dim);font-family:'Space Grotesk',sans-serif}

/* Grid for team */
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:16px}
.person-card{background:var(--a-card);border:1px solid var(--a-bd-sm);border-radius:3px;padding:16px}
.person-card-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.person-photo{width:48px;height:48px;border-radius:2px;object-fit:cover;border:1px solid var(--a-bd-md);flex:none;background:var(--a-inp);display:flex;align-items:center;justify-content:center;color:var(--a-faint);font-size:10px;overflow:hidden}
.person-photo img{width:100%;height:100%;object-fit:cover}
.person-info{flex:1;overflow:hidden}
.person-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--a-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-role{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--a-acc);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person-subrole{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--a-dim)}

/* Cert upload */
.cert-card{background:var(--a-card);border:1px solid var(--a-bd-sm);border-radius:3px;padding:20px;margin-bottom:12px}
.cert-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cert-code{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--a-acc)}
.cert-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--a-dim)}
.cert-preview{width:100%;aspect-ratio:1.414;background:repeating-linear-gradient(-45deg,var(--a-stripe) 0px,var(--a-stripe) 1px,transparent 1px,transparent 8px);border:1px solid var(--a-bd-sm);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;overflow:hidden;max-width:280px}
.cert-preview img{width:100%;height:100%;object-fit:contain}

/* Timeline */
.tl-entry{background:var(--a-inner);border:1px solid var(--a-bd-sm);border-radius:2px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:80px 1fr auto;gap:12px;align-items:start}
.tl-entry input{width:100%}
.tl-entry-del{align-self:center}

/* Kontakt form */
.kontakt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--a-card);border:1px solid var(--a-acc-bd);border-radius:3px;padding:14px 20px;font-size:13px;color:var(--a-text);font-family:'Space Grotesk',sans-serif;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:rgba(224,85,85,0.45);color:var(--a-err-lt)}

/* Util */
.mono{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--a-dim)}
.hidden{display:none!important}
.empty-state{padding:40px;text-align:center;color:var(--a-faint);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em}

/* ── Mobile ─────────────────────────────────────────────────────────────── */
@media (max-width:720px){
  .layout{grid-template-rows:64px auto 1fr;grid-template-columns:1fr;height:auto;min-height:100vh;overflow:visible}
  .topbar{padding:0 16px}
  .topbar-logo{height:44px}
  .topbar-status{display:none}
  .btn-save{padding:8px 14px;font-size:12px}
  .btn-logout{padding:7px 10px;font-size:11px}

  .sidebar{grid-row:2;grid-column:1;border-right:none;border-bottom:1px solid var(--a-bd-sm);padding:0;display:flex;overflow-x:auto;overflow-y:visible;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .sidebar::-webkit-scrollbar{display:none}
  .nav-label{display:none}
  .nav-item{display:inline-flex;flex-shrink:0;padding:14px 18px;border-left:none;border-bottom:2px solid transparent;font-size:13px}
  .nav-item.active{background:var(--a-acc-nav);border-left-color:transparent;border-bottom-color:var(--a-acc)}

  .main{grid-row:3;grid-column:1;padding:20px 16px;overflow-y:visible}

  .form-row{grid-template-columns:1fr}
  .kontakt-grid{grid-template-columns:1fr}
  .person-grid{grid-template-columns:1fr}
  .section-header{flex-direction:column;align-items:flex-start}
  .section-title{font-size:18px}
  .card-head{padding:12px 14px}
  .card-body{padding:14px}
  .cert-preview{max-width:100%}
  .photo-zone{flex-direction:column;align-items:flex-start}
  .form-actions{flex-direction:column;align-items:flex-start}
  .tl-entry{grid-template-columns:1fr auto;grid-template-rows:auto auto}
  .tl-entry>div:first-child{grid-column:1;grid-row:1}
  .tl-entry>div:nth-child(2){grid-column:1;grid-row:2}
  .tl-entry-del{grid-column:2;grid-row:1}
}
</style>
<script>(function(){var t=localStorage.getItem('epd-theme');if(t!=='dark')document.documentElement.setAttribute('data-theme','light');})();</script>

<body>

<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <img src="uploads/epd-logo.png" alt="EPD" class="topbar-logo" id="panel-logo">
    <div class="topbar-right">
      <span class="topbar-status" id="status">Ładowanie...</span>
      <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Tryb jasny"></button>
      <div style="display:flex;border:1px solid rgba(160,200,225,0.15);border-radius:2px;overflow:hidden;flex:none;">
        <button id="lang-pl-btn" onclick="setLang('pl')" class="lang-btn active">PL</button>
        <button id="lang-en-btn" onclick="setLang('en')" class="lang-btn">EN</button>
      </div>
      <button class="btn-save" id="btnSave" onclick="saveAll()" disabled>Zapisz zmiany</button>
      <button class="btn-logout" onclick="logout()">Wyloguj</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="nav-label">Treść strony</div>
    <div class="nav-item active" onclick="showSection('hero')">Strona główna</div>
    <div class="nav-item" onclick="showSection('realizacje')">Realizacje</div>
    <div class="nav-item" onclick="showSection('uslugi')">Usługi</div>
    <div class="nav-label">Firma</div>
    <div class="nav-item" onclick="showSection('ofirmie')">O firmie</div>
    <div class="nav-item" onclick="showSection('kadra')">Kadra</div>
    <div class="nav-item" onclick="showSection('certyfikaty')">Certyfikaty</div>
    <div class="nav-item" onclick="showSection('kontakt')">Kontakt</div>
    <div class="nav-label">Prawne</div>
    <div class="nav-item" onclick="showSection('privacy')">Polityka prywatności</div>
    <div class="nav-label">Ustawienia</div>
    <div class="nav-item" onclick="showSection('settings')">Layout</div>
    <div class="nav-item" onclick="showSection('seo')">SEO</div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="empty-state">ŁADOWANIE DANYCH...</div>
  </main>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUTS -->
<input type="file" id="fileInput" accept="image/*" class="hidden">
<input type="file" id="certFileInput" accept="image/*" class="hidden">

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let TOKEN = '';
let DATA = {};
let currentSection = 'hero';
let pendingPhotoCallback = null;
let pendingCertCallback = null;
let LANG = 'pl';

// ─── Auth guard ─────────────────────────────────────────────────────────────
function redirectToLogin() { window.location.href = '/admin.html'; }

function checkAuth(onSuccess) {
  fetch('/api/auth', { credentials: 'include' })
    .then(r => { if (r.ok) onSuccess(); else redirectToLogin(); })
    .catch(redirectToLogin);
}

// Przy przywróceniu z bfcache (przycisk wstecz po wylogowaniu) — ponowna weryfikacja
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    fetch('/api/auth', { credentials: 'include' })
      .then(r => { if (!r.ok) redirectToLogin(); })
      .catch(redirectToLogin);
  }
});

function logout() {
  fetch('/api/logout', { method: 'POST', credentials: 'include' })
    .finally(() => { window.location.href = '/admin.html'; });
}

// ─── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'err' ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 3500);
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'topbar-status ' + type;
}

// ─── API ────────────────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    credentials: 'include',
    headers: {
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
  if (r.status === 401) { logout(); return null; }
  return r;
}

function setLang(lang) {
  LANG = lang;
  const plBtn = document.getElementById('lang-pl-btn');
  const enBtn = document.getElementById('lang-en-btn');
  if (plBtn && enBtn) {
    plBtn.classList.toggle('active', lang === 'pl');
    enBtn.classList.toggle('active', lang === 'en');
  }
  DATA = {};
  document.getElementById('btnSave').disabled = true;
  loadData();
}

async function loadData() {
  setStatus('Ładowanie...', '');
  try {
    const url = LANG === 'en' ? '/api/content?lang=en' : '/api/content';
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    document.getElementById('btnSave').disabled = false;
    setStatus(LANG === 'en' ? 'EN — dane załadowane' : 'Dane załadowane', 'ok');
    renderSection(currentSection);
  } catch (e) {
    setStatus('Błąd ładowania', 'err');
    toast('Nie można załadować danych: ' + e.message, 'err');
  }
}

async function saveAll() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  setStatus('Zapisywanie...', 'saving');
  collectFormData();

  try {
    const apiUrl = LANG === 'en' ? '/api/content?lang=en' : '/api/content';
    const r = await apiFetch(apiUrl, {
      method: 'POST',
      body: JSON.stringify(DATA)
    });
    if (!r || !r.ok) {
      const d = r ? await r.json() : {};
      throw new Error(d.error || 'Błąd zapisu');
    }
    DATA.meta = { lastUpdated: new Date().toISOString().slice(0,10) };
    setStatus('Zapisano ✓', 'ok');
    toast('Zmiany zapisane pomyślnie');
  } catch (e) {
    setStatus('Błąd zapisu', 'err');
    toast(e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

async function uploadPhoto(file, callback) {
  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result.split(',')[1];
    setStatus('Przesyłanie zdjęcia...', 'saving');
    try {
      const r = await apiFetch('/api/upload', {
        method: 'POST',
        body: JSON.stringify({ filename: file.name, data: b64 })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      setStatus('Zdjęcie przesłane', 'ok');
      callback(d.url);
    } catch (e) {
      setStatus('Błąd uploadu', 'err');
      toast('Błąd przesyłania: ' + e.message, 'err');
    }
  };
  reader.readAsDataURL(file);
}

// ─── Navigation ─────────────────────────────────────────────────────────────
function showSection(name) {
  collectFormData();
  currentSection = name;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().toLowerCase().includes(name) ||
      (name === 'ofirmie' && el.textContent.includes('firmie')) ||
      (name === 'kadra' && el.textContent.includes('Kadra')) ||
      (name === 'certyfikaty' && el.textContent.includes('Certyfi')) ||
      (name === 'kontakt' && el.textContent.includes('Kontakt')) ||
      (name === 'realizacje' && el.textContent.includes('Realizacje')) ||
      (name === 'uslugi' && el.textContent.includes('sługi')) ||
      (name === 'privacy' && el.textContent.includes('Polityk')) ||
      (name === 'settings' && el.textContent.includes('Layout')) ||
      (name === 'seo'      && el.textContent.includes('SEO'))
    );
  });
  renderSection(name);
}

function renderSection(name) {
  const main = document.getElementById('main');
  switch (name) {
    case 'hero':       main.innerHTML = renderHero();       break;
    case 'realizacje': main.innerHTML = renderRealizacje(); break;
    case 'uslugi':     main.innerHTML = renderUslugi();     break;
    case 'ofirmie':    main.innerHTML = renderOfirmie();    break;
    case 'kadra':      main.innerHTML = renderKadra();      break;
    case 'certyfikaty':main.innerHTML = renderCertyfikaty();break;
    case 'kontakt':    main.innerHTML = renderKontakt();    break;
    case 'privacy':    main.innerHTML = renderPrivacy();    break;
    case 'seo':        main.innerHTML = renderSEO();       break;
    case 'settings':   main.innerHTML = renderSettings();  break;
  }
  bindSectionEvents(name);
}

// ─── Collect before save/navigate ───────────────────────────────────────────
function collectFormData() {
  switch (currentSection) {
    case 'hero':    collectHero();    break;
    case 'uslugi':  collectUslugi();  break;
    case 'ofirmie': collectOfirmie(); break;
    case 'kontakt': collectKontakt(); break;
    case 'privacy':   collectPrivacy();  break;
    case 'seo':       collectSEO();      break;
    case 'settings':  collectSettings(); break;
  }
}

            <div>

            </div>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:14px 20px;border:2px solid ${theme==='dark'?'var(--a-acc)':'var(--a-bd-md)'};border-radius:3px;background:${theme==='dark'?'var(--a-acc-bg)':'transparent'};flex:1;transition:border-color .2s,background .2s;">
            <input type="radio" name="default-theme" id="st-dark" value="dark" ${theme==='dark'?'checked':''} onchange="updateThemePreview()" style="accent-color:var(--a-acc);width:16px;height:16px;flex:none;">
            <div>
              <div style="font-weight:600;font-size:13px;color:var(--a-heading);margin-bottom:3px;">Ciemny</div>
              <div style="font-size:11px;color:var(--a-muted);">Granatowe tło, jasny tekst</div>
            </div>
          </label>
        </div>
        <div style="margin-top:24px;padding:12px 16px;background:var(--a-acc-bg);border:1px solid var(--a-acc-bd);border-radius:3px;font-size:12px;color:var(--a-muted);">
          Ustawienie jest globalne — dotyczy zarówno wersji PL jak i EN. Zostanie zapisane automatycznie w obu językach.
        </div>
        <div style="margin-top:20px;">
          <button class="btn-save" onclick="saveSettings()">Zapisz ustawienia</button>
          <span class="mono" id="settings-msg" style="margin-left:14px;font-size:12px;"></span>
        </div>
      </div>
    </div>
  `;
}

function updateThemePreview() {
  const val = document.querySelector('input[name="default-theme"]:checked')?.value || 'light';
  document.querySelectorAll('label[for]').forEach(l => {
    const input = document.getElementById(l.getAttribute('for'));
    if (!input || input.name !== 'default-theme') return;
    const active = input.value === val;
    l.style.borderColor = active ? 'var(--a-acc)' : 'var(--a-bd-md)';
    l.style.background  = active ? 'var(--a-acc-bg)' : 'transparent';
  });
  document.querySelectorAll('input[name="default-theme"]').forEach(function(inp) {
    const lbl = inp.closest('label');
    if (!lbl) return;
    const active = inp.value === val;
    lbl.style.borderColor = active ? 'var(--a-acc)' : 'var(--a-bd-md)';
    lbl.style.background  = active ? 'var(--a-acc-bg)' : 'transparent';
  });
}

function collectSettings() {
  const checked = document.querySelector('input[name="default-theme"]:checked');
  if (!checked) return;
  DATA.settings = DATA.settings || {};
  DATA.settings.default_theme = checked.value;
}

async function saveSettings() {
  collectSettings();
  const msg = document.getElementById('settings-msg');
  if (msg) msg.textContent = 'Zapisywanie...';
  setStatus('Zapisywanie ustawień...', 'saving');

  try {
    const [rPL, rEN] = await Promise.all([
      fetch('/api/content'),
      fetch('/api/content?lang=en')
    ]);
    const [dataPL, dataEN] = await Promise.all([rPL.json(), rEN.json()]);

    dataPL.settings = DATA.settings;
    dataEN.settings = DATA.settings;

    const [savePL, saveEN] = await Promise.all([
      apiFetch('/api/content',          { method: 'POST', body: JSON.stringify(dataPL) }),
      apiFetch('/api/content?lang=en',  { method: 'POST', body: JSON.stringify(dataEN) })
    ]);

    if (!savePL?.ok || !saveEN?.ok) throw new Error('Błąd zapisu');

    setStatus('Zapisano ✓', 'ok');
    if (msg) { msg.textContent = '✓ Zapisano'; setTimeout(() => msg.textContent = '', 2500); }
    toast('Ustawienia zapisane w obu językach');
  } catch(e) {
    setStatus('Błąd zapisu', 'err');
    if (msg) msg.textContent = '✗ Błąd';
    toast('Błąd zapisu ustawień: ' + e.message, 'err');
  }
}

  const pp = DATA.privacy_policy = DATA.privacy_policy || { title: '', tag: '', sections: [] };
  pp.sections = pp.sections || [];
  pp.sections.push({ heading: '', content: '' });
  renderSection('privacy');
}

function delPrivacySection(i) {
  if (!confirm('Usunąć tę sekcję?')) return;
  collectPrivacy();
  DATA.privacy_policy.sections.splice(i, 1);
  renderSection('privacy');
}

function toggleCard(bodyId) {
  const el = document.getElementById(bodyId);
  if (el) el.classList.toggle('open');
}

function collectPrivacy() {
  const pp = DATA.privacy_policy = DATA.privacy_policy || { title: '', tag: '', sections: [] };
  const titleEl = document.getElementById('pp-title');
  const tagEl   = document.getElementById('pp-tag');
  if (titleEl) pp.title = titleEl.value.trim();
  if (tagEl)   pp.tag   = tagEl.value.trim();
  const sections = [];
  let i = 0;
  while (document.getElementById('pp-h-' + i)) {
    sections.push({
      heading: document.getElementById('pp-h-' + i).value.trim(),
      content: document.getElementById('pp-c-' + i).value.trim()
    });
    i++;
  }
  if (i > 0) pp.sections = sections;
}

// ─── KONTAKT ──────────────────────────────────────────────────────────────────
function renderKontakt() {
  const k = DATA.kontakt || {};
  return `
    <div class="section-header">
      <span class="section-title">Dane kontaktowe</span>
    </div>
    <div class="card">
      <div class="card-body open" id="kontakt-body">
        <div class="form-group"><label class="fl">Nazwa firmy</label><input type="text" id="k-firma" value="${esc(k.firma||'')}"></div>
        <div class="form-row">
          <div><label class="fl">Ulica</label><input type="text" id="k-ulica" value="${esc(k.ulica||'')}"></div>
          <div><label class="fl">Miasto</label><input type="text" id="k-miasto" value="${esc(k.miasto||'')}"></div>
        </div>
        <div class="form-row">
          <div><label class="fl">E-mail</label><input type="email" id="k-email" value="${esc(k.email||'')}"></div>
          <div><label class="fl">Telefon</label><input type="tel" id="k-telefon" value="${esc(k.telefon||'')}"></div>
        </div>
        <hr class="form-divider">
        <div class="kontakt-grid">
          <div class="form-group"><label class="fl">NIP</label><input type="text" id="k-nip" value="${esc(k.nip||'')}"></div>
          <div class="form-group"><label class="fl">KRS</label><input type="text" id="k-krs" value="${esc(k.krs||'')}"></div>
          <div class="form-group"><label class="fl">REGON</label><input type="text" id="k-regon" value="${esc(k.regon||'')}"></div>
          <div class="form-group"><label class="fl">LinkedIn URL</label><input type="url" id="k-linkedin" value="${esc(k.linkedin||'')}"></div>
        </div>
      </div>
    </div>
  `;
}

function collectKontakt() {
  const fields = ['firma','ulica','miasto','email','telefon','nip','krs','regon','linkedin'];
  DATA.kontakt = DATA.kontakt || {};
  fields.forEach(f => {
    const el = document.getElementById(`k-${f}`);
    if (el) DATA.kontakt[f] = el.value.trim();
  });
}

// ─── File input handlers ─────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function() {
  if (!this.files[0]) return;
  const cb = pendingPhotoCallback || pendingSeoCallback;
  if (!cb) return;
  uploadPhoto(this.files[0], cb);
  this.value = '';
  pendingPhotoCallback = null;
  pendingSeoCallback   = null;
});

document.getElementById('certFileInput').addEventListener('change', function() {
  if (!this.files[0] || !pendingCertCallback) return;
  uploadPhoto(this.files[0], pendingCertCallback);
  this.value = '';
  pendingCertCallback = null;
});

// ─── Util ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindSectionEvents() { /* events are inline */ }

// ─── Theme ───────────────────────────────────────────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('epd-theme', next);
  updateThemeBtn();
}
function updateThemeBtn() {
  const btn = document.getElementById('btn-theme');
  if (!btn) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const logo = document.getElementById('panel-logo');
  if (logo) logo.src = isLight ? 'uploads/epd-logo.png' : 'uploads/epd-logo-white.png';
  btn.title = isLight ? 'Tryb ciemny' : 'Tryb jasny';
  btn.innerHTML = isLight
    ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>'
    : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
}

// ─── Init ────────────────────────────────────────────────────────────────────
updateThemeBtn();
checkAuth(function() {
  document.body.style.display = 'block';
  loadData();
});
</script>
